name: Deploy demo page to GitHub Pages

on:
  push:
    branches: [main]
    # Re-deploy whenever the demo page or this workflow itself changes.
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  # Also allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel queued duplicates rather than racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages for the repo (and set Source = GitHub Actions)
          # on first run, so deployment doesn't fail with "Get Pages site failed".
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
